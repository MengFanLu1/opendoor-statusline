name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            name: opendoor-statusline-linux-x64.tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: opendoor-statusline-linux-x64-static.tar.gz
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            name: opendoor-statusline-windows-x64.zip
          - target: x86_64-apple-darwin
            os: macos-latest
            name: opendoor-statusline-macos-x64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            name: opendoor-statusline-macos-arm64.tar.gz

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross-compilation tools (Windows)
      if: matrix.target == 'x86_64-pc-windows-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 pkg-config libssl-dev

    - name: Install musl tools (Linux static)
      if: matrix.target == 'x86_64-unknown-linux-musl'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools pkg-config libssl-dev

    - name: Build binary
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package Linux/macOS
      if: matrix.os != 'windows-latest' && matrix.target != 'x86_64-pc-windows-gnu'
      run: |
        mkdir -p dist
        cp target/${{ matrix.target }}/release/opendoor-statusline dist/opendoor-statusline
        cd dist
        tar czf ../${{ matrix.name }} opendoor-statusline

    - name: Package Windows
      if: matrix.target == 'x86_64-pc-windows-gnu'
      run: |
        mkdir -p dist
        cp target/${{ matrix.target }}/release/opendoor-statusline.exe dist/opendoor-statusline.exe
        cd dist
        zip ../${{ matrix.name }} opendoor-statusline.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: ${{ matrix.name }}

  release:
    name: Create Release & Publish NPM
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*/*
        generate_release_notes: true
        draft: false
        prerelease: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        registry-url: 'https://registry.npmjs.org'

    - name: Extract binaries from archives
      run: |
        mkdir -p extracted

        # macOS x64
        tar -xzf artifacts/opendoor-statusline-macos-x64.tar.gz/opendoor-statusline-macos-x64.tar.gz -C extracted
        mv extracted/opendoor-statusline extracted/opendoor-statusline-darwin-x64

        # macOS ARM64
        tar -xzf artifacts/opendoor-statusline-macos-arm64.tar.gz/opendoor-statusline-macos-arm64.tar.gz -C extracted
        mv extracted/opendoor-statusline extracted/opendoor-statusline-darwin-arm64

        # Linux x64
        tar -xzf artifacts/opendoor-statusline-linux-x64.tar.gz/opendoor-statusline-linux-x64.tar.gz -C extracted
        mv extracted/opendoor-statusline extracted/opendoor-statusline-linux-x64

        # Linux musl (static)
        tar -xzf artifacts/opendoor-statusline-linux-x64-static.tar.gz/opendoor-statusline-linux-x64-static.tar.gz -C extracted
        mv extracted/opendoor-statusline extracted/opendoor-statusline-linux-x64-musl

        # Windows
        unzip artifacts/opendoor-statusline-windows-x64.zip/opendoor-statusline-windows-x64.zip -d extracted
        mv extracted/opendoor-statusline.exe extracted/opendoor-statusline-win32-x64.exe

        ls -la extracted/

    - name: Prepare NPM packages
      run: |
        node npm/scripts/prepare-packages.js

        cp extracted/opendoor-statusline-darwin-x64 npm-publish/darwin-x64/opendoor-statusline
        cp extracted/opendoor-statusline-darwin-arm64 npm-publish/darwin-arm64/opendoor-statusline
        cp extracted/opendoor-statusline-linux-x64 npm-publish/linux-x64/opendoor-statusline
        cp extracted/opendoor-statusline-linux-x64-musl npm-publish/linux-x64-musl/opendoor-statusline
        cp extracted/opendoor-statusline-win32-x64.exe npm-publish/win32-x64/opendoor-statusline.exe

        chmod +x npm-publish/darwin-x64/opendoor-statusline
        chmod +x npm-publish/darwin-arm64/opendoor-statusline
        chmod +x npm-publish/linux-x64/opendoor-statusline
        chmod +x npm-publish/linux-x64-musl/opendoor-statusline

        echo "Package structure:"
        find npm-publish -name "package.json" | head -10

    - name: Publish platform packages to NPM
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        for platform in darwin-x64 darwin-arm64 linux-x64 linux-x64-musl win32-x64; do
          echo "Publishing @opendoor/ai-status-line-${platform}..."
          cd npm-publish/$platform
          npm publish --access public
          cd ../..
          echo "Done: @opendoor/ai-status-line-${platform}"
        done

    - name: Wait for NPM registry
      run: sleep 30

    - name: Publish main package to NPM
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        cd npm-publish/main
        echo "Publishing @opendoor/ai-status-line..."
        npm publish --access public
        echo "Done: @opendoor/ai-status-line"
        echo ""
        echo "Install with: npm install -g @opendoor/ai-status-line"
